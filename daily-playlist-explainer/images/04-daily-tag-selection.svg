<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef3b45"/>
    </marker>
    <style>
      .bg { fill: #f7f7f9; }
      .card { fill: #ffffff; stroke: #dedee6; stroke-width: 2; rx: 18; }
      .title { font: 700 34px Arial, sans-serif; fill: #11131a; }
      .label { font: 700 22px Arial, sans-serif; fill: #11131a; }
      .small { font: 400 18px Arial, sans-serif; fill: #5f6270; }
      .tiny { font: 400 15px Arial, sans-serif; fill: #737684; }
      .line { stroke: #ef3b45; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .chip { fill: #ffe8ea; stroke: #ef3b45; stroke-width: 1.5; rx: 13; }
      .chip2 { fill: #eaf2ff; stroke: #3a7bd5; stroke-width: 1.5; rx: 13; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="700"/>
  <text class="title" x="54" y="68">3. Daily tag selection</text>
  <text class="small" x="56" y="102">Each day starts with user tags. The code makes 10 different song tag sets.</text>

  <rect class="card" x="55" y="160" width="250" height="360"/>
  <text class="label" x="92" y="210">Saved user tags</text>
  <rect class="chip" x="92" y="245" width="110" height="30"/><text class="tiny" x="112" y="266">rock</text>
  <rect class="chip" x="92" y="285" width="135" height="30"/><text class="tiny" x="112" y="306">synthpop</text>
  <rect class="chip" x="92" y="325" width="120" height="30"/><text class="tiny" x="112" y="346">jazz</text>
  <rect class="chip" x="92" y="365" width="120" height="30"/><text class="tiny" x="112" y="386">funk</text>
  <rect class="chip" x="92" y="405" width="135" height="30"/><text class="tiny" x="112" y="426">post rock</text>
  <text class="small" x="92" y="475">many more...</text>

  <line class="line" x1="315" y1="340" x2="415" y2="340"/>

  <rect class="card" x="440" y="145" width="300" height="180"/>
  <text class="label" x="490" y="195">Profile songs</text>
  <text class="small" x="486" y="230">7 songs use only</text>
  <text class="small" x="486" y="260">known user tags</text>
  <text class="tiny" x="486" y="294">example: jazz + swing + trumpet</text>

  <rect class="card" x="440" y="375" width="300" height="180"/>
  <text class="label" x="492" y="425">Hybrid songs</text>
  <text class="small" x="486" y="460">3 songs use half user tags</text>
  <text class="small" x="486" y="490">and half related tags</text>
  <text class="tiny" x="486" y="524">example: dark + breaks + big beat</text>

  <line class="line" x1="755" y1="235" x2="850" y2="305"/>
  <line class="line" x1="755" y1="465" x2="850" y2="385"/>

  <rect class="card" x="870" y="230" width="270" height="230"/>
  <text class="label" x="922" y="280">Diversity filter</text>
  <text class="small" x="910" y="315">avoid same clusters</text>
  <text class="small" x="910" y="347">avoid recent history</text>
  <text class="small" x="910" y="379">use stable date seed</text>
  <rect class="chip2" x="910" y="405" width="170" height="30"/>
  <text class="tiny" x="930" y="426">10 tag seeds</text>
</svg>
