<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef3b45"/>
    </marker>
    <style>
      .bg { fill: #f6f6f8; }
      .card { fill: #ffffff; stroke: #dedee6; stroke-width: 2; rx: 18; }
      .title { font: 700 34px Arial, sans-serif; fill: #11131a; }
      .label { font: 700 22px Arial, sans-serif; fill: #11131a; }
      .small { font: 400 18px Arial, sans-serif; fill: #5f6270; }
      .tiny { font: 400 15px Arial, sans-serif; fill: #737684; }
      .accent { fill: #ef3b45; }
      .line { stroke: #ef3b45; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .chip { fill: #ffe8ea; stroke: #ef3b45; stroke-width: 1.5; rx: 14; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="title" x="54" y="68">OpenBand daily playlist, in one picture</text>
  <text class="small" x="56" y="102">The system starts with taste. It ends with songs in the app.</text>

  <rect class="card" x="55" y="170" width="170" height="145"/>
  <circle class="accent" cx="95" cy="210" r="18"/>
  <text class="label" x="82" y="255">User taste</text>
  <text class="small" x="78" y="283">tags saved</text>

  <line class="line" x1="235" y1="243" x2="335" y2="243"/>

  <rect class="card" x="355" y="170" width="190" height="145"/>
  <rect class="chip" x="386" y="203" width="128" height="30"/>
  <text class="tiny" x="405" y="224">tag model</text>
  <text class="label" x="386" y="263">Recommend</text>
  <text class="small" x="386" y="291">make tag sets</text>

  <line class="line" x1="555" y1="243" x2="655" y2="243"/>

  <rect class="card" x="675" y="170" width="180" height="145"/>
  <text class="label" x="712" y="232">10 song</text>
  <text class="label" x="725" y="262">seeds</text>
  <text class="small" x="714" y="291">6 tags each</text>

  <line class="line" x1="865" y1="243" x2="965" y2="243"/>

  <rect class="card" x="985" y="170" width="160" height="145"/>
  <text class="label" x="1034" y="232">LLM</text>
  <text class="small" x="1018" y="263">brief, style,</text>
  <text class="small" x="1026" y="291">lyrics</text>

  <line class="line" x1="1065" y1="325" x2="1065" y2="408"/>

  <rect class="card" x="905" y="430" width="240" height="145"/>
  <text class="label" x="973" y="487">Suno</text>
  <text class="small" x="944" y="518">create and</text>
  <text class="small" x="958" y="546">download</text>

  <line class="line" x1="895" y1="503" x2="735" y2="503"/>

  <rect class="card" x="485" y="430" width="230" height="145"/>
  <text class="label" x="540" y="487">Library</text>
  <text class="small" x="525" y="518">one saved song</text>
  <text class="small" x="548" y="546">per prompt</text>

  <line class="line" x1="475" y1="503" x2="315" y2="503"/>

  <rect class="card" x="75" y="430" width="220" height="145"/>
  <text class="label" x="118" y="487">Mobile app</text>
  <text class="small" x="107" y="518">daily playlist</text>
  <text class="small" x="121" y="546">is ready</text>
</svg>
